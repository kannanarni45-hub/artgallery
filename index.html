<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Arts | Exhibition</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* 1. CONTINUOUS BACKGROUND ANIMATION */
        #heart-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: var(--gold);
            filter: drop-shadow(0 0 5px var(--gold));
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.3); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-15vh) scale(1); opacity: 0; }
        }

        /* 2. LOGIN BOARD */
        #login-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            transition: all 1s ease;
        }

        .login-box {
            padding: 40px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--gold);
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* 3. GALLERY SECTION */
        #main-content {
            position: relative;
            z-index: 10;
            display: none; 
            padding: 60px 5%;
        }

        .header-title {
            font-size: 3rem;
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .img-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s ease;
        }

        .img-card:hover {
            transform: scale(1.02);
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--gold);
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        /* MODAL / SLIDESHOW */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #modal img { max-width: 90%; max-height: 85vh; border: 1px solid var(--gold); }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: var(--gold); }
    </style>
</head>
<body>

    <div id="heart-canvas"></div>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--gold);">Micro Arts Login</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="login()">Enter Gallery</button>
            <p id="err" style="color: #ff4444; font-size: 13px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="main-content">
        <h1 class="header-title">Micro Arts</h1>
        <div style="text-align: center; margin-bottom: 40px;">
            <button class="btn" onclick="openSlideshow(0)">▶ Start Slideshow</button>
        </div>

        <div class="gallery-grid" id="grid"></div>
    </div>

    <div id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button class="btn" onclick="move(-1)" style="position: absolute; left: 20px;">Prev</button>
        <img id="m-img" src="">
        <button class="btn" onclick="move(1)" style="position: absolute; right: 20px;">Next</button>
    </div>

        // Heart Animation
        const canvas = document.getElementById('heart-canvas');
        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 15 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 5 + 6) + 's';
            canvas.appendChild(h);
            setTimeout(() => h.remove(), 11000);
        }
        setInterval(createHeart, 400);

        // Updated Login Logic
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "micro" && p === "kanna1920") {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    renderGallery();
                }, 1000);
            } else {
                document.getElementById('err').innerText = "Incorrect details.";
            }
        }

        function renderGallery() {
            const grid = document.getElementById('grid');
            images.forEach((src, idx) => {
                const card = document.createElement('div');
                card.className = 'img-card';
                card.innerHTML = `<img src="${src}" onclick="openSlideshow(${idx})">`;
                grid.appendChild(card);
            });
        }

        let current = 0;
        function openSlideshow(idx) {
            current = idx;
            document.getElementById('m-img').src = images[current];
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function move(step) {
            current = (current + step + images.length) % images.length;
            document.getElementById('m-img').src = images[current];
        }
